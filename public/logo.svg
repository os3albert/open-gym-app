<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Open Gym">
  <title>Open Gym</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#65a30d" />
      <stop offset="1" stop-color="#3f6212" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#og-bg)" />
  <!-- Manubrio inclinato: ghiere, dischi e barra centrale -->
