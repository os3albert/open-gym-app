    <rect x="4" y="28" width="5" height="8" rx="2.5" />
    <rect x="11" y="19" width="10" height="26" rx="5" />
    <rect x="23" y="29" width="18" height="6" rx="3" />
    <rect x="43" y="19" width="10" height="26" rx="5" />
    <rect x="55" y="28" width="5" height="8" rx="2.5" />
  </g>
</svg>
