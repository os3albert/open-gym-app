# Analisi statica continua su SonarCloud (issue #47).
# La chiave e l'organizzazione arrivano da SonarCloud: vanno cambiate se il repo cambia proprietario.
sonar.projectKey=os3albert_open-gym-app
sonar.organization=os3albert
sonar.projectName=Open Gym
sonar.projectVersion=1.5.0

# Codice di produzione (app + worker della community) e test, dichiarati a parte:
# le regole di Sonar sui test sono diverse da quelle sul codice applicativo.
sonar.sources=src,worker/src
sonar.tests=tests,cypress/e2e,features
sonar.exclusions=src/vite-env.d.ts,**/*.d.ts,dist/**,coverage/**,ui/**

# Copertura dai test unit/integrazione (Vitest → lcov). Cucumber e Cypress non contribuiscono
# alla copertura: sono già gate a sé nella CI.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
