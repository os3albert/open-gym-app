name: Release

# Release dal tag (es. v1.0.0): release GitHub con il changelog della versione
# e immagine Docker su GHCR taggata con la versione oltre a latest.
# I tag si tagliano da main, che è già passata da tutta la pipeline CI.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      # La build include il typecheck: nessun tag rotto diventa una release
      - run: npm run build

      - name: Versione dal tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Changelog della versione
        run: |
          awk "/^## ${{ steps.version.outputs.version }}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > release-body.md
          if ! [ -s release-body.md ]; then
            echo "Sezione ${{ steps.version.outputs.version }} assente dal CHANGELOG" >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3
      - name: Login a GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push dell'immagine versionata
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: Open Gym ${{ github.ref_name }}
          body_path: release-body.md
