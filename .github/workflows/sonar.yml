name: SonarCloud

# IN PAUSA: SonarCloud non è ancora configurato (manca il secret SONAR_TOKEN), quindi il passo di
# analisi veniva saltato — ma il job girava lo stesso `npm ci` + coverage a ogni push e a ogni PR,
# bruciando minuti per nulla. Resta solo l'avvio manuale.
#
# PER RIACCENDERLO: imposta il secret SONAR_TOKEN (SonarCloud → My Account → Security) e togli il
# commento ai due trigger qui sotto.
#
# ATTENZIONE, i file di configurazione sono DUE e non si parlano:
#   - `sonar-project.properties` vale per l'analisi lanciata dalla CI (questo workflow) ed esclude ui/**;
#   - `.sonarcloud.properties` vale per l'Automatic Analysis dell'app SonarCloud, che il primo file
#     NON lo legge: è per questo che analizzava i mockup di ui/ e bocciava il Quality Gate.
# L'Automatic Analysis si spegne solo dalla UI di SonarCloud (Administration → Analysis Method).
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - 'community/**'
  # pull_request:
  #   branches: [main]

jobs:
  analisi:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      # A livello job: uno step non può leggere in `if` gli env che definisce lui stesso
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Sonar usa la storia per attribuire le issue ai commit: niente clone superficiale
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      # La copertura arriva dai test unit/integrazione: senza, Sonar riporterebbe 0%
      - run: npm run test:coverage
      - name: Analisi (saltata finché SONAR_TOKEN non è configurato)
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
