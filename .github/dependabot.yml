version: 2

updates:
  # Dipendenze dell'app: gli aggiornamenti minori/patch arrivano raggruppati, i major singoli
  # (così una PR rossa si legge subito e non mescola più aggiornamenti insieme).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minori-e-patch:
        update-types: [minor, patch]

  # Le action dei workflow: sono codice che gira coi permessi del repo, vanno tenute aggiornate
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
