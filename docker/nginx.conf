server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Header di sicurezza: qui possiamo mandarli davvero (su GitHub Pages no, e infatti
    # la Content-Security-Policy viaggia come <meta>, generata a build time in vite.config.ts).
    # add_header non è ereditato dai blocchi location: va ripetuto dove serve (vedi sotto).
    server_tokens off;

    # Bundle con hash nel nome: cache aggressiva
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Il service worker e la shell devono sempre poter essere aggiornati
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        # L'app non usa fotocamera, microfono, geolocalizzazione né pagamenti: si negano
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        try_files $uri $uri/ /index.html;
    }
}
